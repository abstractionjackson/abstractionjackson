{{ define "siteStyles" }} {{ with resources.GetMatch "sass/home.scss" }} {{
$styles := resources.ToCSS . | minify | fingerprint }}
<link
  rel="stylesheet"
  href="{{ $styles.Permalink }}"
  integrity="{{ $styles.Data.Integrity }}"
/>
{{ end }} {{ end }} {{ define "main" }}
<main id="home">
  <header id="home-hero">{{ partial "hero.html" }}</header>
  <section id="home-content">{{ .Content }}</section>
</main>
{{ end }}
